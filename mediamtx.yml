# MediaMTX config cho lớp học live
# Tải tại: https://github.com/bluenviron/mediamtx/releases
# Chạy: ./mediamtx mediamtx.yml
# (Bản đang dùng thực tế: tools/mediamtx/mediamtx.yml)

rtmpAddress: :1935     # Meld Studio stream vào đây
hlsAddress: :8888      # Học sinh xem qua đây (HLS)
rtspAddress: :8554
webrtcAddress: :8889
apiAddress: :9997

# HLS settings — mpegts gộp audio+video vào 1 luồng .ts (tương thích tốt nhất với hls.js)
# Buffer ~20s (10 đoạn × 2s) để máy/wifi yếu không bị "mất kết nối" do segment hết hạn
hls: yes
hlsVariant: mpegts
hlsSegmentCount: 10
hlsSegmentDuration: 2s

api: yes

paths:
  all_others:
